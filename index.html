<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBU — Sistem Pencarian Klasifikasi Konstruksi</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e28;
    --surface: #1e2330;
    --surface2: #252a38;
    --border: #2e3448;
    --accent: #f5a623;
    --accent2: #e8863a;
    --accent-dim: rgba(245,166,35,0.12);
    --accent-glow: rgba(245,166,35,0.25);
    --green: #4ade80;
    --blue: #60a5fa;
    --purple: #c084fc;
    --pink: #f472b6;
    --text: #e8ecf4;
    --text2: #8892a8;
    --text3: #545e75;
    --red: #ff6b6b;
    --konstruksi: #60a5fa;
    --spesialis: #4ade80;
    --konsultan: #c084fc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: .4;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 0 2rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: .75rem;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    display: grid;
    place-items: center;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: .8rem;
    color: #000;
    letter-spacing: -.02em;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: .04em;
    color: var(--text);
  }
  .logo-text span { color: var(--accent); }

  .header-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .72rem;
    color: var(--text3);
    letter-spacing: .06em;
  }

  /* HERO SEARCH */
  .hero {
    position: relative;
    z-index: 5;
    padding: 3rem 2rem 2rem;
    text-align: center;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  }

  .hero-title {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 800;
    letter-spacing: -.02em;
    line-height: 1.1;
    margin-bottom: .5rem;
  }
  .hero-title .highlight {
    color: var(--accent);
    position: relative;
  }
  .hero-subtitle {
    color: var(--text2);
    font-size: .95rem;
    font-weight: 300;
    margin-bottom: 2rem;
    letter-spacing: .02em;
  }

  /* SEARCH BOX */
  .search-wrapper {
    max-width: 720px;
    margin: 0 auto;
  }

  .search-box {
    position: relative;
    margin-bottom: 1rem;
  }

  .search-icon {
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    pointer-events: none;
    font-size: 1.1rem;
  }

  #searchInput {
    width: 100%;
    padding: 1rem 1rem 1rem 3.25rem;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow);
  }
  #searchInput::placeholder { color: var(--text3); }

  /* FILTER TABS */
  .filter-row {
    display: flex;
    gap: .5rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: .45rem 1.1rem;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: .75rem;
    letter-spacing: .05em;
    cursor: pointer;
    transition: all .18s;
    text-transform: uppercase;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 500;
  }

  /* STATS BAR */
  .stats-bar {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: .75rem;
  }

  .stats-group {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: .72rem;
    color: var(--text2);
  }
  .stat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .stat-pill strong {
    color: var(--text);
    font-size: .9rem;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .result-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .8rem;
    color: var(--text3);
  }
  .result-count span { color: var(--accent); font-weight: 500; }

  /* MAIN CONTENT */
  .main {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 64px - 56px - 110px);
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 1.25rem;
    background: var(--bg2);
    position: sticky;
    top: 0;
    height: calc(100vh - 240px);
    overflow-y: auto;
  }

  .sidebar-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
  }

  .category-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .6rem .9rem;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: .3rem;
    text-align: left;
  }
  .category-btn:hover { background: var(--surface); border-color: var(--border); }
  .category-btn.active { background: var(--accent-dim); border-color: var(--accent); }

  .cat-label {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    color: var(--text);
  }
  .category-btn.active .cat-label { color: var(--accent); }

  .cat-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .7rem;
    color: var(--text3);
    background: var(--surface2);
    padding: .1rem .5rem;
    border-radius: 99px;
  }
  .category-btn.active .cat-count {
    background: var(--accent);
    color: #000;
  }

  .sidebar-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1rem 0;
  }

  /* RESULTS */
  .results-area {
    padding: 1.5rem;
    overflow-y: auto;
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1rem;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: transform .18s, border-color .18s, box-shadow .18s;
    cursor: default;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }
  .card.type-konstruksi::before { background: var(--konstruksi); }
  .card.type-spesialis::before { background: var(--spesialis); }
  .card.type-konsultan::before { background: var(--konsultan); }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--surface2);
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: .75rem;
    gap: .5rem;
  }

  .card-kbli {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .75rem;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    padding: .2rem .6rem;
    border-radius: 4px;
    letter-spacing: .04em;
    white-space: nowrap;
  }

  .card-type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .65rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: .2rem .55rem;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-konstruksi { background: rgba(96,165,250,.15); color: var(--konstruksi); }
  .badge-spesialis { background: rgba(74,222,128,.15); color: var(--spesialis); }
  .badge-konsultan { background: rgba(192,132,252,.15); color: var(--konsultan); }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: .92rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: .6rem;
    letter-spacing: -.01em;
  }

  .card-code-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .75rem;
  }

  .card-subkode {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .78rem;
    color: var(--text2);
    background: var(--bg3);
    padding: .15rem .55rem;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .card-section {
    margin-bottom: .5rem;
  }
  .card-section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--text3);
    margin-bottom: .25rem;
  }
  .card-section-value {
    font-size: .8rem;
    color: var(--text2);
    line-height: 1.5;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: .3rem;
    margin-top: .6rem;
  }
  .tag {
    font-size: .68rem;
    padding: .15rem .5rem;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--text3);
    border: 1px solid var(--border);
    font-family: 'IBM Plex Sans', sans-serif;
    transition: color .15s, border-color .15s;
  }
  .tag:hover { color: var(--text2); border-color: var(--text3); }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    text-align: center;
    grid-column: 1 / -1;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .4; }
  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: .4rem;
  }
  .empty-sub { font-size: .85rem; color: var(--text3); }

  /* HIGHLIGHT */
  mark {
    background: var(--accent);
    color: #000;
    border-radius: 2px;
    padding: 0 1px;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; display: flex; flex-wrap: wrap; gap: .4rem; padding: 1rem; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-title { width: 100%; margin-bottom: .4rem; }
    .category-btn { width: auto; flex: 0 0 auto; }
    .results-grid { grid-template-columns: 1fr; }
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card { animation: fadeUp .3s ease both; }
</style>
</head>

    <hr class="sidebar-divider">

    <div id="quickFilters"></div>
  </aside>

  <!-- RESULTS -->
  <main class="results-area">
    <div class="results-grid" id="resultsGrid"></div>
  </main>
</div>

// ============================================================
// STATE
// ============================================================
let currentFilter = 'all';
let currentCategory = 'all';
let searchQuery = '';

// ============================================================
// INIT COUNTS
// ============================================================
function initCounts() {
  const k = data.filter(d=>d.type==='konstruksi').length;
  const s = data.filter(d=>d.type==='spesialis').length;
  const c = data.filter(d=>d.type==='konsultan').length;
  document.getElementById('countKonstruksi').textContent = k;
  document.getElementById('countSpesialis').textContent = s;
  document.getElementById('countKonsultan').textContent = c;
  document.getElementById('catAll').textContent = data.length;
  document.getElementById('catKonstruksi').textContent = k;
  document.getElementById('catSpesialis').textContent = s;
  document.getElementById('catKonsultan').textContent = c;
  document.getElementById('totalCount').textContent = data.length;
}

// ============================================================
// SEARCH + FILTER
// ============================================================
function getFiltered() {
  let q = searchQuery.trim().toLowerCase();
  return data.filter(d => {
    // category filter
    if (currentCategory !== 'all' && d.type !== currentCategory) return false;
    // if no query, show all
    if (!q) return true;
    // field filter
    if (currentFilter === 'kbli') return d.kbli.toLowerCase().includes(q);
    if (currentFilter === 'subbidang') return d.subbidang.toLowerCase().includes(q);
    if (currentFilter === 'subklasifikasi') return d.subklas.toLowerCase().includes(q) || d.kode.toLowerCase().includes(q);
    // all: search everything
    return (
      d.kbli.toLowerCase().includes(q) ||
      d.subbidang.toLowerCase().includes(q) ||
      d.kode.toLowerCase().includes(q) ||
      d.subklas.toLowerCase().includes(q) ||
      d.klasifikasi.toLowerCase().includes(q)
    );
  });
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function renderCards(items) {
  const grid = document.getElementById('resultsGrid');
  document.getElementById('resultCount').textContent = items.length;

  if (!items.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">Tidak ada hasil ditemukan</div>
        <div class="empty-sub">Coba ubah kata kunci atau filter pencarian Anda</div>
      </div>`;
    return;
  }

  const q = searchQuery.trim().toLowerCase();
  grid.innerHTML = items.map((d, i) => {
    const typeLabel = {konstruksi:'Konstruksi', spesialis:'Spesialis', konsultan:'Konsultan'}[d.type];
    const tags = d.subklas.split('/').map(t=>t.trim()).filter(Boolean);
    return `
      <div class="card type-${d.type}" style="animation-delay:${Math.min(i*0.03,0.4)}s">
        <div class="card-header">
          <span class="card-kbli">${hl(d.kbli, q)}</span>
          <span class="card-type-badge badge-${d.type}">${typeLabel}</span>
        </div>
        <div class="card-title">${hl(d.subbidang, q)}</div>
        <div class="card-code-row">
          <span class="card-subkode">${hl(d.kode, q)}</span>
        </div>
        <div class="card-section">
          <div class="card-section-label">Klasifikasi</div>
          <div class="card-section-value">${hl(d.klasifikasi, q)}</div>
        </div>
        <div class="card-section">
          <div class="card-section-label">Sub Klasifikasi</div>
          <div class="tags">${tags.map(t=>`<span class="tag">${hl(t,q)}</span>`).join('')}</div>
        </div>
      </div>`;
  }).join('');
}

function update() {
  const items = getFiltered();
  renderCards(items);
}

// ============================================================
// QUICK FILTERS (sidebar)
// ============================================================
function buildQuickFilters() {
  const prefixes = ['BG','BS','PL','KK','KP','IN','PB','AR','RK','RT','AL','IT','AT','PA'];
  const labels = {
    BG:'Gedung', BS:'Bangunan Sipil', PL:'Pekerjaan Lahan',
    KK:'Konstruksi Khusus', KP:'Prapabrikasi', IN:'Instalasi',
    PB:'Pekerjaan Bangunan', AR:'Arsitektural', RK:'Rekayasa',
    RT:'Rekayasa Teknologi', AL:'Area & Lanskap', IT:'Ilmiah & Teknis',
    AT:'Analisis & Uji', PA:'Peralatan'
  };
  const container = document.getElementById('quickFilters');
  container.innerHTML = prefixes.map(p => {
    const count = data.filter(d=>d.kode.startsWith(p)).length;
    if (!count) return '';
    return `<button class="category-btn" onclick="quickFilter('${p}')" title="Filter kode ${p}">
      <span class="cat-label" style="font-size:.78rem">${labels[p]||p}</span>
      <span class="cat-count">${count}</span>
    </button>`;
  }).join('');
}

function quickFilter(prefix) {
  document.getElementById('searchInput').value = prefix;
  searchQuery = prefix;
  currentFilter = 'subklasifikasi';
  // update filter button
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-filter="subklasifikasi"]').classList.add('active');
  update();
}

// ============================================================
// EVENTS
// ============================================================
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  update();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    update();
  });
});

document.querySelectorAll('.category-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.category-btn[data-cat]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    update();
  });
});

// ============================================================
// BOOT
// ============================================================
initCounts();
buildQuickFilters();
update();
</script>
